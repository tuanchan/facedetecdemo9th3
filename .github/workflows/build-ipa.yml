name: Build Unsigned IPA (ESign)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Override API URL (optional)'
        required: false
        default: ''

# ─────────────────────────────────────────────────────────────
# HOW TO INSTALL ON iOS via ESign (no Apple account needed):
#
# 1. Download the artifact "face-attendance-unsigned.ipa"
#    from the Actions run page.
# 2. Transfer IPA to your iPhone (AirDrop / Files / web server).
# 3. Open ESign app → Import IPA → Sign with any free cert.
# 4. Trust the certificate in Settings → General → VPN & Device Mgmt.
# 5. Launch "Điểm Danh" — done!
#
# ESign download: https://esign.yyyue.xyz
# ─────────────────────────────────────────────────────────────

jobs:
  build-ios:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Flutter ────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      # ── 3. Get dependencies ──────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── 4. Run tests (optional — comment out to skip) ────────
      # - name: Run tests
      #   run: flutter test

      # ── 5. Patch API URL if overridden via workflow_dispatch ──
      - name: Patch API URL (optional)
        if: ${{ github.event.inputs.api_url != '' }}
        run: |
          sed -i '' "s|https://your-api.example.com/api/FaceAttendance/checkin-image|${{ github.event.inputs.api_url }}|g" \
            lib/app.dart

      # ── 6. Build iOS (no codesign) ───────────────────────────
      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=FLUTTER_BUILD_NAME=1.0.0 \
            --dart-define=FLUTTER_BUILD_NUMBER=${{ github.run_number }}

      # ── 7. Package into unsigned IPA ─────────────────────────
      - name: Create Payload directory
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/

      - name: Zip into IPA
        run: |
          cd build/ios/ipa
          zip -r ../../../face-attendance-unsigned.ipa Payload
          echo "✅ IPA created: face-attendance-unsigned.ipa"

      - name: Show IPA size
        run: |
          ls -lh face-attendance-unsigned.ipa
          echo "Build number: ${{ github.run_number }}"
          echo "Git commit: ${{ github.sha }}"

      # ── 8. Upload artifact ───────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: face-attendance-unsigned-${{ github.run_number }}
          path: face-attendance-unsigned.ipa
          retention-days: 14
          if-no-files-found: error

      # ── 9. Create GitHub Release (on tag push) ───────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: face-attendance-unsigned.ipa
          name: "Face Attendance v${{ github.ref_name }}"
          body: |
            ## 📱 Cài đặt qua ESign (không cần Apple ID)

            1. Tải file `face-attendance-unsigned.ipa` bên dưới
            2. Chuyển vào iPhone qua AirDrop hoặc Files
            3. Mở **ESign** → Import IPA → Sign with free cert
            4. Vào **Settings → General → VPN & Device Management** → Trust cert
            5. Mở app **Điểm Danh** ✅

            > ESign: https://esign.yyyue.xyz

            Build: #${{ github.run_number }} | Commit: ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
