name: face_attendance
description: Face recognition attendance app for iOS
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5+9

  # ML Kit face detection (on-device)
  google_mlkit_face_detection: ^0.11.0

  # HTTP
  http: ^1.2.1

  # Audio
  audioplayers: ^6.0.0

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/

